name: "사실 오류 제보"
description: "국가 전략 요약, 비교 내용, 데이터에서 사실과 다른 부분을 제보합니다."
labels: ["needs-evidence", "fact-check"]
body:
  - type: dropdown
    id: section
    attributes:
      label: "해당 영역"
      options:
        - 국가 전략 요약
        - 국가 비교표
        - 한국 PEST 진단
        - 정책 제안
        - 인사이트
        - 데이터/출처
        - 기타
    validations:
      required: true
  - type: input
    id: country
    attributes:
      label: "관련 국가"
      placeholder: "예: 한국, 미국, EU, 일본, 중국"
  - type: textarea
    id: current
    attributes:
      label: "현재 서비스에 표시된 내용"
      placeholder: "오류가 있는 문구를 복사해 주세요."
    validations:
      required: true
  - type: textarea
    id: correct
    attributes:
      label: "올바른 내용 또는 수정 제안"
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: "근거 자료 (출처)"
      placeholder: "공식 문서명, URL, 발행기관, 발행일 등"
